<!doctype html>
<html>
<head>
    <title>Ganbreeder</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link href="/index.css" rel="stylesheet">
    <link href="/gene_editor.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1><a href='/'>Ganbreeder</a></h1>
        <p>Edit the labels that shape this image</p>
        <nav><a href="/i?k={{ key }}">Back to image</a></nav>
    </header>

    <img id="parent_image" src="{{ root }}{{ key }}.jpeg">

    <div class="gene_editor">
        <div id="gene_rows"></div>
        <div class="combobox">
            <input id="label_search" placeholder="Search labels..." autocomplete="off">
            <ul id="label_dropdown" style="display:none">
                {% for i, name in label_options %}
                <li data-index="{{ i }}">{{ name }}</li>
                {% endfor %}
            </ul>
        </div>
        <button class="submit" id="generate" disabled>Generate</button>
    </div>

    <template id="gene_row_template">
        <div class="gene_row">
            <span class="gene_name"></span>
            <input class="gene_slider" type="range" min="0" max="1" step="0.01">
            <input class="gene_weight" type="number" min="0" max="100" step="1">
            <span class="gene_percent"></span>
            <button type="button" class="gene_remove">x</button>
        </div>
    </template>

    <div id="loading_container" style="display:none">
        <img class="loading" src="/image/loading.gif" style="width:50%;">
        <p>Generating</p>
    </div>

    <div id="result" style="display:none">
        <a class="imglink"><img></a>
    </div>

    
    <script>
        const key = "{{ key }}";
        const root = "{{ root }}";
        const initial_genes = {{ genes|tojson }};
    </script>
    <script src="/utils.js"></script>
    <script src="/gene_editor.js"></script>
</body>
</html>
