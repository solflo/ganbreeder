<!doctype html>
<html>
<head>
    <title>Ganbreeder</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link href="/index.css" rel="stylesheet">
    <style>
        form.mixinput input[type=text] { width: 200px; }
        input.submit {
            padding: 16px 20px;
            margin: 8px 0;
            width: 100px;
            cursor: pointer;
            opacity: 0.9;
            font-size: 1.2em;
        }
        .container { text-align: center; }
        .container img {
            width: 128px;
            height: 128px;
            margin-top: 10px;
            margin-right: 25px;
            margin-left: 25px;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href='/'>Ganbreeder</a></h1>
        <h3>Paste in two ganbreeder links to mix</h3>
        <p class="center"><a href="/latest">Latest</a> | <a href="/starred">Starred</a></p>
        <br>
    </header>

    <form class="mixinput" style="text-align:center;">
        <input class="parent1" type="text" placeholder="Enter url" required>
        <input class="parent2" type="text" placeholder="Enter url" required>
        <br>
        <input class="submit" type="submit" value="Submit">
    </form>

    <div class="container">
        <img class="parent">
        <img class="parent">
    </div>

    <div class="image_container" id="loading_container" style="display:none">
        <img class="loading" src="/image/loading.gif" style="width:50%;">
        <p>Loading Children</p>
    </div>

    <div class="image_container content" style="display:none">
        {% for _ in range(12) %}
        <a class="imglink"><img></a>
        {% endfor %}
    </div>

    <div id="footer"></div>
    <script>
        const root = "{{ root }}";
    </script>
    <script src="/utils.js"></script>
    <script src="/mix.js"></script>
</body>
</html>
